<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4FC3F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0288D1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#grad1)"/>
  
  <!-- Clock face -->
  <circle cx="64" cy="64" r="45" fill="none" stroke="#ffffff" stroke-width="4"/>
  
  <!-- Clock hands -->
  <!-- Hour hand -->
  <line x1="64" y1="64" x2="64" y2="40" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="64" y1="64" x2="82" y2="64" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Center dot -->
  <circle cx="64" cy="64" r="4" fill="#ffffff"/>
  
  <!-- Handoff arrows -->
  <path d="M 90 64 L 100 64 L 95 59" stroke="#FFD700" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 100 64 L 95 69" stroke="#FFD700" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Clock markers -->
  <circle cx="64" cy="24" r="2" fill="#ffffff"/>
  <circle cx="64" cy="104" r="2" fill="#ffffff"/>
  <circle cx="104" cy="64" r="2" fill="#ffffff"/>
  <circle cx="24" cy="64" r="2" fill="#ffffff"/>
</svg>
